<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ginter Optika — CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/crm.css">
</head>
<body>

<div class="app">
  <div class="topnav">
    <div class="topnav-left">
      <h1>Ginter Optika</h1>
      <div class="nav-tabs">
        <div class="nav-tab active" data-section="clients" onclick="switchSection('clients')">Klijenti</div>
        <div class="nav-tab" data-section="orders" onclick="switchSection('orders')">Porudžbine</div>
        <div class="nav-tab" data-section="exams" onclick="switchSection('exams')">Pregledi</div>
        <div class="nav-tab" data-section="debts" onclick="switchSection('debts')">Dugovanja<span class="count-badge" id="debts-count" style="display:none;"></span></div>
      </div>
    </div>
    <div class="topnav-user">
      Prijavljeni ste kao <b id="current-user-name"></b>
      <button class="btn-secondary" onclick="logout()">Odjava</button>
    </div>
  </div>

  <div class="section-body active" id="section-clients">
    <div class="sidebar">
      <div class="sidebar-header">
        <input type="text" id="search-input" placeholder="Pretraga pacijenta..." oninput="renderPatientList(this.value)">
        <button class="btn-primary" style="width:100%;" onclick="openAddPatientModal()">+ Novi pacijent</button>
      </div>
      <div class="patient-list-wrap">
        <div class="letter-index" id="letter-index"></div>
        <div class="patient-list" id="patient-list"></div>
      </div>
    </div>
    <div class="main">
      <div class="content" id="content">
        <div class="empty-state">Izaberite pacijenta sa leve strane</div>
      </div>
    </div>
  </div>

  <div class="section-body" id="section-orders">
    <div class="full-view">
      <div class="filters-row">
        <input type="text" id="orders-search-name" placeholder="Ime pacijenta..." oninput="debouncedOrdersSearch()">
        <input type="date" id="orders-search-date" onchange="debouncedOrdersSearch()">
        <button class="btn-secondary" onclick="clearOrdersFilters()">Poništi filtere</button>
      </div>
      <div id="orders-table-wrap"></div>
    </div>
  </div>

  <div class="section-body" id="section-exams">
    <div class="full-view">
      <div class="filters-row">
        <input type="text" id="exams-search-name" placeholder="Ime pacijenta..." oninput="debouncedExamsSearch()">
        <input type="date" id="exams-search-date" onchange="debouncedExamsSearch()">
        <button class="btn-secondary" onclick="clearExamsFilters()">Poništi filtere</button>
      </div>
      <div id="exams-table-wrap"></div>
    </div>
  </div>

  <div class="section-body" id="section-debts">
    <div class="full-view">
      <div class="filters-row">
        <input type="text" id="debts-search-name" placeholder="Ime pacijenta..." oninput="renderDebtsTable()">
      </div>
      <div id="debts-table-wrap"></div>
    </div>
  </div>
</div>

<!-- Modal: Pacijent -->
<div class="modal-overlay" id="patient-modal">
  <div class="modal">
    <h3 id="patient-modal-title">Novi pacijent</h3>
    <form id="patient-form" onsubmit="savePatientForm(event)">
      <input type="hidden" id="patient-form-id">
      <div class="field-grid">
        <div>
          <label>Ime</label>
          <input type="text" id="patient-form-first-name">
        </div>
        <div>
          <label>Prezime</label>
          <input type="text" id="patient-form-last-name">
        </div>
        <div>
          <label>Godine</label>
          <input type="number" id="patient-form-age" min="0" max="120">
        </div>
        <div>
          <label>Telefon</label>
          <input type="text" id="patient-form-phone">
        </div>
        <div>
          <label>Datum posete</label>
          <input type="date" id="patient-form-visit-date">
        </div>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="patient-form-tkt">
        <label for="patient-form-tkt">TKT</label>
      </div>
      <label>Napomene</label>
      <textarea id="patient-form-notes" rows="3" style="width:100%;font-family:inherit;font-size:17px;padding:12px;border:1px solid var(--border);border-radius:14px;"></textarea>
      <div class="modal-actions">
        <button type="button" class="btn-secondary" onclick="closeModal('patient-modal')">Otkaži</button>
        <button type="submit" class="btn-primary">Sačuvaj</button>
      </div>
    </form>
  </div>
</div>

<!-- Modal: Recept -->
<div class="modal-overlay" id="rx-modal">
  <div class="modal">
    <h3 id="rx-modal-title">Novi recept</h3>
    <form id="rx-form" onsubmit="savePrescriptionForm(event)">
      <input type="hidden" id="rx-form-id">
      <label>Namena</label>
      <select id="rx-form-purpose" style="width:100%;margin-bottom:16px;padding:14px;font-size:18px;border:1px solid var(--border);border-radius:14px;" onchange="toggleRxClFields()">
        <option value="za daljinu">za daljinu</option>
        <option value="za blizinu">za blizinu</option>
        <option value="za računar">za računar</option>
        <option value="progresivno">progresivno</option>
        <option value="kontaktna sočiva">kontaktna sočiva</option>
      </select>

      <div class="rx-grid">
        <div class="eye-label">OD (desno oko)</div>
        <div><label>Sph</label><input type="text" id="rx-form-od_sph" placeholder="npr. +2,5"></div>
        <div><label>Cyl</label><input type="text" id="rx-form-od_cyl"></div>
        <div><label>Ax</label><input type="text" id="rx-form-od_ax"></div>
        <div></div>

        <div class="eye-label">OS (levo oko)</div>
        <div><label>Sph</label><input type="text" id="rx-form-os_sph"></div>
        <div><label>Cyl</label><input type="text" id="rx-form-os_cyl"></div>
        <div><label>Ax</label><input type="text" id="rx-form-os_ax"></div>
        <div></div>

        <div class="eye-label">Opšte</div>
        <div><label>PD</label><input type="text" id="rx-form-pd"></div>
        <div><label>Add</label><input type="text" id="rx-form-add"></div>
        <div><label>Degr</label><input type="text" id="rx-form-degr"></div>
        <div></div>
      </div>

      <div id="rx-cl-fields" class="field-grid" style="display:none;margin-top:16px;">
        <div>
          <label>BC</label>
          <input type="text" id="rx-form-bc" placeholder="npr. 8,6">
        </div>
        <div>
          <label>DIA</label>
          <input type="text" id="rx-form-dia" placeholder="npr. 14,2">
        </div>
      </div>

      <div class="checkbox-row" style="margin-top:16px;">
        <input type="checkbox" id="rx-form-client">
        <label for="rx-form-client">Klijentov recept</label>
      </div>

      <label>Pregled izvršio/la</label>
      <select id="rx-form-checked-by" style="width:100%;margin-bottom:16px;padding:14px;font-size:18px;border:1px solid var(--border);border-radius:14px;">
        <option value="">— izaberite —</option>
        <option value="Ervin">Ervin</option>
        <option value="Anna">Anna</option>
        <option value="Bojana">Bojana</option>
        <option value="lični">lični</option>
      </select>

      <label>Komentar</label>
      <textarea id="rx-form-comment" rows="2" style="width:100%;font-family:inherit;font-size:17px;padding:12px;border:1px solid var(--border);border-radius:14px;"></textarea>

      <div class="modal-actions">
        <button type="button" class="btn-secondary" onclick="closeModal('rx-modal')">Otkaži</button>
        <button type="submit" class="btn-primary">Sačuvaj</button>
      </div>
    </form>
  </div>
</div>

<!-- Modal: Porudžbina -->
<div class="modal-overlay" id="order-modal">
  <div class="modal">
    <h3 id="order-modal-title">Nova porudžbina</h3>
    <form id="order-form" onsubmit="saveOrderForm(event)">
      <input type="hidden" id="order-form-id">

      <div class="type-toggle">
        <button type="button" data-type="glasses" class="active" onclick="setOrderType('glasses')">👓 Naočare</button>
        <button type="button" data-type="contact_lenses" onclick="setOrderType('contact_lenses')">👁 Kontaktna sočiva</button>
      </div>

      <div class="field-grid">
        <div>
          <label>Datum porudžbine</label>
          <input type="date" id="order-form-date">
        </div>
        <div>
          <label>Broj porudžbine (sa koverte)</label>
          <input type="text" id="order-form-envelope">
        </div>
      </div>

      <label>Povezati recept(e)</label>
      <div id="order-form-prescriptions-list" style="margin-bottom:16px;"></div>

      <div id="glasses-fields">
        <div class="section-heading">Okviri</div>
        <div id="frames-container"></div>
        <button type="button" class="btn-secondary" onclick="addFrameRow()" style="margin-bottom:20px;">+ Dodaj okvir</button>

        <div class="section-heading">Stakla</div>
        <div id="lens-container"></div>
        <button type="button" class="btn-secondary" onclick="addLensRow()" style="margin-bottom:20px;">+ Dodaj stakla</button>

        <div class="field-grid">
          <div>
            <label>Izrada</label>
            <input type="number" id="order-form-izrada" min="0" placeholder="0" oninput="updateOrderFormTotal()">
          </div>
        </div>
      </div>

      <div id="cl-fields" style="display:none;">
        <div class="section-heading">Kontaktna sočiva</div>
        <div class="field-grid">
          <div>
            <label>Naziv</label>
            <input type="text" id="order-form-cl-name">
          </div>
          <div>
            <label>BC</label>
            <input type="text" id="order-form-cl-bc">
          </div>
          <div>
            <label>Dioptrija</label>
            <input type="text" id="order-form-cl-diopters">
          </div>
          <div>
            <label>Rok zamene</label>
            <input type="text" id="order-form-cl-period" placeholder="npr. 1 mesec">
          </div>
          <div>
            <label>Cena po komadu</label>
            <input type="number" id="order-form-cl-price" min="0" oninput="updateOrderFormTotal()">
          </div>
          <div>
            <label>Količina</label>
            <input type="number" id="order-form-cl-qty" min="1" value="1" oninput="updateOrderFormTotal()">
          </div>
        </div>
      </div>

      <div class="total-box" style="margin-bottom:20px;">
        <div class="row"><span>Ukupno</span><span id="order-form-total-preview">0 RSD</span></div>
        <div class="row final"><span>Ostalo za uplatu</span><span id="order-form-remaining-preview">0 RSD</span></div>
      </div>

      <div class="field-grid">
        <div>
          <label>Akontacija</label>
          <input type="number" id="order-form-prepayment" min="0" placeholder="0" oninput="updateOrderFormTotal()">
        </div>
        <div>
          <label>Način plaćanja</label>
          <select id="order-form-payment-method" style="width:100%;padding:14px;font-size:18px;border:1px solid var(--border);border-radius:14px;">
            <option value="">— izaberite —</option>
            <option value="Gotovinom">Gotovinom</option>
            <option value="Kartica">Kartica</option>
            <option value="Ček">Ček</option>
            <option value="Virman">Virman</option>
          </select>
        </div>
      </div>

      <div class="checkbox-row">
        <input type="checkbox" id="order-form-installment" onchange="toggleInstallmentFields(this.checked)">
        <label for="order-form-installment">Na rate</label>
      </div>

      <div id="installment-fields" style="display:none;background:var(--section-bg);border-radius:14px;padding:16px;margin-bottom:16px;">
        <div id="installment-list" style="margin-bottom:12px;"></div>
        <div class="field-grid" style="margin-bottom:8px;">
          <div><label>Datum uplate</label><input type="date" id="installment-date"></div>
          <div><label>Iznos</label><input type="number" id="installment-amount" min="0"></div>
          <div>
            <label>Način plaćanja</label>
            <select id="installment-type" style="width:100%;padding:14px;font-size:18px;border:1px solid var(--border);border-radius:14px;">
              <option value="karticom">karticom</option>
              <option value="gotovinom">gotovinom</option>
              <option value="ček">ček</option>
            </select>
          </div>
        </div>
        <button type="button" class="btn-secondary" onclick="addInstallment()">+ Dodaj uplatu</button>
      </div>

      <label>Komentar</label>
      <textarea id="order-form-comment" rows="2" style="width:100%;font-family:inherit;font-size:17px;padding:12px;border:1px solid var(--border);border-radius:14px;"></textarea>

      <div class="modal-actions">
        <button type="button" class="btn-secondary" onclick="closeModal('order-modal')">Otkaži</button>
        <button type="submit" class="btn-primary">Sačuvaj</button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/patients.js"></script>
<script src="js/prescriptions.js"></script>
<script src="js/orders.js"></script>
<script src="js/nav.js"></script>
<script>
  requireAuth();
  const user = getCurrentUser();
  document.getElementById('current-user-name').textContent = user.name;

  loadPatients();
  initDebtBadge();
</script>
</body>
</html>
